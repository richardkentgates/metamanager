name: Lint

on:
  push:
    branches: [ "dev", "test" ]
    paths:
      - 'metamanager-install.sh'
      - 'daemons/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ "dev", "test", "main" ]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y -qq shellcheck

      - name: Lint install script
        run: shellcheck -S error metamanager-install.sh

      - name: Lint daemon scripts
        run: |
          shellcheck -S error daemons/metamanager-compress-daemon.sh
          shellcheck -S error daemons/metamanager-meta-daemon.sh
