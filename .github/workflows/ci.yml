name: CI Tests (No Composer)

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - 'includes/**'
      - 'metamanager.php'
      - 'tests/**'
      - 'phpstan.neon'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  test:
    name: PHP ${{ matrix.php }} / WP ${{ matrix.wp }}
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.1"
            wp: "6.4"
          - php: "8.2"
            wp: "6.5"
          - php: "8.3"
            wp: "latest"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Download PHPUnit (no Composer)
        run: |
          curl -L https://phar.phpunit.de/phpunit-9.6.0.phar -o /usr/local/bin/phpunit
          chmod +x /usr/local/bin/phpunit
          phpunit --version

      - name: Download PHPStan (no Composer)
        run: |
          curl -L https://github.com/phpstan/phpstan/releases/latest/download/phpstan.phar -o /usr/local/bin/phpstan
          chmod +x /usr/local/bin/phpstan
          phpstan --version

      - name: Setup WP test environment
        run: |
          bash tests/bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 latest false
        env:
          WP_TESTS_TAG: ${{ matrix.wp }}

      - name: Run PHPUnit
        run: phpunit --configuration tests/phpunit.xml

      - name: Run PHPStan
        run: phpstan analyse --configuration phpstan.neon --error-format=github/
