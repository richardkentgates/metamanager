name: Build .deb and Deploy to Apt Repo

on:
  push:
    branches: ["test"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq debhelper dpkg-dev build-essential

      - name: Determine version
        id: version
        run: |
          VERSION=$(dpkg-parsechangelog -S Version | sed 's/-[0-9]*$//')
          VERSION="${VERSION}~test$(date +%s)"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build .deb
        run: |
          dpkg-buildpackage -us -uc -b
          ls -lh ../metamanager_*.deb

      - name: Deploy to apt repo
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          APT_HOST: ${{ secrets.DEPLOY_HOST }}
          APT_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "${SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${APT_HOST}" >> ~/.ssh/known_hosts 2>/dev/null

          # Ensure pool directory exists
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${APT_USER}@${APT_HOST}" \
            "sudo mkdir -p /var/www/html/pool/m/metamanager && sudo chown -R ${APT_USER}:${APT_USER} /var/www/html/pool"

          # Upload .deb
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ../metamanager_*.deb \
            "${APT_USER}@${APT_HOST}:/var/www/html/pool/m/metamanager/"

          # Regenerate Packages index and sign Release files
          ssh -i ~/.ssh/deploy_key "${APT_USER}@${APT_HOST}" << 'REMOTE'
            cd /var/www/html

            # Regenerate Packages for bookworm distribution
            apt-ftparchive \
              -o APT::FTPArchive::Release::Origin="metamanager" \
              -o APT::FTPArchive::Release::Label="metamanager" \
              -o APT::FTPArchive::Release::Suite="bookworm" \
              -o APT::FTPArchive::Release::Codename="bookworm" \
              -o APT::FTPArchive::Release::Architectures="amd64" \
              -o APT::FTPArchive::Release::Components="main" \
              -o APT::FTPArchive::Release::Description="Metamanager apt repository" \
              release dists/bookworm > dists/bookworm/Release

            # Sign Release files
            gpg --batch --yes --default-key E0395903AE72DD661AD11DF76C0D53C3F9B96454 \
              --clearsign --output dists/bookworm/InRelease dists/bookworm/Release
            gpg --batch --yes --default-key E0395903AE72DD661AD11DF76C0D53C3F9B96454 \
              --armor --detach-sign --output dists/bookworm/Release.gpg dists/bookworm/Release

            echo "Packages index regenerated and signed"
          REMOTE

          echo "Deployed .deb to apt repo"
          echo "Version: ${{ steps.version.outputs.version }}"
