name: PHPUnit Integration Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'includes/**'
      - 'metamanager.php'
      - 'tests/**'
      - 'composer.json'
  pull_request:
    branches: [ "main" ]

jobs:
  phpunit:
    name: PHPUnit — PHP ${{ matrix.php }} / WP ${{ matrix.wp }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.1"
            wp: "6.4"
          - php: "8.2"
            wp: "6.5"
          - php: "8.3"
            wp: "latest"

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, pdo_mysql
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Download WordPress ${{ matrix.wp }}
        run: |
          WP_VERSION="${{ matrix.wp }}"
          if [ "$WP_VERSION" = "latest" ]; then
            curl -sL https://wordpress.org/latest.tar.gz | tar -xz -C /tmp
          else
            curl -sL "https://wordpress.org/wordpress-${WP_VERSION}.tar.gz" | tar -xz -C /tmp
          fi

      - name: Create WordPress test database and config
        run: |
          mysql -u root -proot -h 127.0.0.1 -e "CREATE DATABASE IF NOT EXISTS wordpress_test;"
          cat > tests/wp-tests-config.php << 'PHP'
          <?php
          define( 'ABSPATH',        '/tmp/wordpress/' );
          define( 'DB_NAME',        'wordpress_test' );
          define( 'DB_USER',        'root' );
          define( 'DB_PASSWORD',    'root' );
          define( 'DB_HOST',        '127.0.0.1' );
          define( 'DB_CHARSET',     'utf8' );
          define( 'DB_COLLATE',     '' );
          $table_prefix             = 'wptests_';
          define( 'WP_TESTS_DOMAIN', 'example.org' );
          define( 'WP_TESTS_EMAIL',  'admin@example.org' );
          define( 'WP_TESTS_TITLE',  'Test Blog' );
          define( 'WP_PHP_BINARY',   'php' );
          define( 'WPLANG',          '' );
          PHP

      - name: Run PHPUnit
        run: vendor/bin/phpunit --configuration phpunit.xml.dist
