<script>
(function () {
    'use strict';

    /* ── Active nav link via IntersectionObserver ──────────────────── */
    setTimeout(function () {
        var sections = document.querySelectorAll('article section[id]');
        var navLinks = document.querySelectorAll('.site-nav a[href^="#"]');
        if (!sections.length || !navLinks.length) return;

        var observer = new IntersectionObserver(function (entries) {
            entries.forEach(function (entry) {
                if (entry.isIntersecting) {
                    navLinks.forEach(function (a) { a.classList.remove('active'); });
                    var id = entry.target.getAttribute('id');
                    var link = document.querySelector('.site-nav a[href="#' + id + '"]');
                    if (link) {
                        link.classList.add('active');
                    }
                }
            });
        }, { rootMargin: '-20% 0px -70% 0px' });

        sections.forEach(function (s) { observer.observe(s); });
    }, 600);

    /* ── Mobile: close nav when a link is clicked ──────────────────── */
    document.addEventListener('click', function (e) {
        var toggle = document.getElementById('nav-toggle');
        if (!toggle) return;

        /* Toggle dropdown open/closed on mobile parent tap */
        var li = e.target.closest('.has-dropdown > a');
        if (li && window.innerWidth <= 680) {
            e.preventDefault();
            var parent = li.closest('.has-dropdown');
            if (parent) {
                parent.classList.toggle('open');
            }
            return;
        }

        /* Close whole nav when anchor link clicked */
        if (e.target.closest('.site-nav a[href^="#"]')) {
            toggle.checked = false;
        }
    });

}());
</script>
